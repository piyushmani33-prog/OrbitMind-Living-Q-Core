name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (3.12 production baseline)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # The quantum extra (Qiskit + Aer) is required so the bounded QAOA benchmark
          # COMPLETES in CI exactly as it does locally; without it quantum benchmarks
          # downgrade to insufficient-evidence and the quantum-gated tests would skip,
          # diverging from the 666-passed local baseline.
          pip install -e ".[dev,quantum]"

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Ruff (format check)
        run: python -m ruff format --check .

      - name: mypy (strict)
        run: python -m mypy src

      - name: Alembic migration applies
        run: python -m alembic upgrade head
        env:
          ORBITMIND_DATABASE_URL: sqlite:///./ci.db

      - name: Pytest (+ coverage)
        run: python -m pytest --cov=orbitmind --cov-report=term-missing

  # Live PostgreSQL integration (Phase 3B). Separate from the default offline job so
  # ordinary unit tests never require PostgreSQL. Uses CI-only test credentials; no
  # secrets, no external network, no uploaded artifacts.
  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: orbitmind
          POSTGRES_PASSWORD: orbitmind
          POSTGRES_DB: orbitmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbitmind -d orbitmind_test"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      PG_URL: postgresql+psycopg://orbitmind:orbitmind@127.0.0.1:5432/orbitmind_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (3.12 production baseline)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (incl. PostgreSQL driver + quantum adapter)
        run: |
          python -m pip install --upgrade pip
          # quantum extra: the live-PostgreSQL quantum tamper/persistence tests must RUN
          # (43 passed, not skipped) — they require a completed Aer QAOA experiment.
          pip install -e ".[postgres,dev,quantum]"

      - name: Alembic migration applies to PostgreSQL head
        run: python -m alembic upgrade head
        env:
          ORBITMIND_DATABASE_URL: ${{ env.PG_URL }}

      - name: PostgreSQL integration tests
        run: python -m pytest -m postgres -v
        env:
          ORBITMIND_TEST_POSTGRES_URL: ${{ env.PG_URL }}

      - name: PostgreSQL retrieval evaluation (full-text)
        run: python scripts/pg_validate.py
        env:
          ORBITMIND_DATABASE_URL: ${{ env.PG_URL }}

  # GitHub dependency review on PRs (supply-chain guard, SR/R-008). This action needs the
  # Dependency graph + GitHub Advanced Security, which are unavailable on private repos, so it
  # is restricted to PUBLIC repositories; private PRs are covered by `dependency-audit` below.
  dependency-review:
    if: ${{ github.event_name == 'pull_request' && github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  # Python dependency vulnerability audit on PRs (works on private repos; no Advanced Security
  # required). Mandatory — pip-audit failures fail the job; vulnerabilities are not suppressed.
  dependency-audit:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install OrbitMind and audit tooling
        run: |
          python -m pip install -e ".[postgres,dev,quantum]"
          python -m pip install pip-audit

      - name: Audit installed Python dependencies
        run: python -m pip_audit
