# Local development services for OrbitMind.
#
# PostgreSQL is the Phase 3B production system-of-record (ADR-0018). It is OPTIONAL
# for local work: SQLite remains the default for unit tests and basic development.
# Start PostgreSQL only when you want to exercise PostgreSQL full-text retrieval:
#
#     docker compose --profile postgres up -d
#
# Then point the app at it (note: no secrets are committed; this is a local-only,
# throwaway development password):
#
#     ORBITMIND_DATABASE_URL=postgresql+psycopg://orbitmind:orbitmind@localhost:5432/orbitmind
#
# Run migrations against it with:  alembic upgrade head
#
# This file is intentionally minimal and for LOCAL DEVELOPMENT ONLY. Do not reuse
# these credentials or expose this service beyond localhost.

services:
  postgres:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: orbitmind
      POSTGRES_PASSWORD: orbitmind
      POSTGRES_DB: orbitmind
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - orbitmind_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitmind -d orbitmind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  orbitmind_pgdata:
    # Local named volume; never committed. Excluded from VCS by .gitignore.
